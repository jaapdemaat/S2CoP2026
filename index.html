<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BAGCD Community Resources — Tag Map</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #ffffff;
      color: #1a1a1a;
      font-family: 'Inter', 'Helvetica Neue', Arial, sans-serif;
      overflow: hidden;
    }

    #graph-container {
      position: fixed;
      top: 0; left: 0;
      width: 100vw; height: 100vh;
      z-index: 0;
    }

    /* ── Controls ── */
    #controls {
      position: fixed;
      top: 16px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    #search {
      background: rgba(0, 0, 0, 0.03);
      border: 1px solid rgba(0, 0, 0, 0.10);
      border-radius: 4px;
      padding: 7px 12px;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 12px;
      color: #1a1a1a;
      width: 180px;
      outline: none;
      transition: border-color 0.2s;
    }
    #search::placeholder { color: rgba(0, 0, 0, 0.25); }
    #search:focus { border-color: rgba(0, 0, 0, 0.30); }

    .ctrl-btn {
      background: rgba(0, 0, 0, 0.03);
      border: 1px solid rgba(0, 0, 0, 0.10);
      border-radius: 4px;
      padding: 7px 14px;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      color: #1a1a1a;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s;
      white-space: nowrap;
    }
    .ctrl-btn:hover {
      background: rgba(0, 0, 0, 0.06);
      border-color: rgba(0, 0, 0, 0.20);
    }

    /* ── Stats ── */
    #stats {
      position: fixed;
      bottom: 16px;
      left: 20px;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      color: rgba(0, 0, 0, 0.25);
      z-index: 10;
    }

    /* ── Tooltip ── */
    #tooltip {
      position: absolute;
      pointer-events: none;
      background: rgba(255, 255, 255, 0.96);
      border: 1px solid rgba(0, 0, 0, 0.06);
      border-radius: 4px;
      padding: 10px 14px;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 12px;
      line-height: 1.6;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      box-shadow: 0 4px 20px rgba(0,0,0,0.06);
      display: none;
      max-width: 280px;
      z-index: 100;
    }
    .tt-label { font-weight: 500; font-size: 13px; margin-bottom: 2px; }
    .tt-cop { color: rgba(0, 0, 0, 0.4); font-size: 11px; }
    .tt-count { margin-top: 4px; font-size: 11px; color: rgba(0, 0, 0, 0.35); }

    svg { width: 100%; height: 100%; }
    svg text { font-family: 'IBM Plex Mono', monospace; }
  </style>
</head>
<body>

<div id="controls">
  <input type="text" id="search" placeholder="Search tags…" spellcheck="false" autocomplete="off">
  <button class="ctrl-btn" id="btn-reset">Reset</button>
</div>

<div id="stats"></div>

<div id="tooltip">
  <div class="tt-label"></div>
  <div class="tt-cop"></div>
  <div class="tt-count"></div>
</div>

<div id="graph-container">
  <svg id="graph"></svg>
</div>

<script src="https://d3js.org/d3.v7.min.js"></script>
<script>
const CFG = {
  palette: {
    cop01: '#E8763A', cop02: '#3AABE8', cop03: '#E8C93A', cop04: '#3AE89B',
    cop05: '#C73AE8', cop06: '#E85A5A', cop07: '#5AE8C4', cop08: '#E8A63A',
    cop09: '#5A8AE8', cop10: '#D4E85A',
  },
  nodeAlpha: 0.80,
  nodeDimmed: 0.04,
  edgeAlpha: 0.035,
  edgeHighlight: 0.18,
  edgeDimmed: 0.005,
  // Only the very top tags get permanent labels
  labelMinCount: 30,
};

let activeCop = null;

const svg = d3.select('#graph');
const width = window.innerWidth;
const height = window.innerHeight;
svg.attr('width', width).attr('height', height);

const tooltip = document.getElementById('tooltip');

d3.json('graph.json').then(data => {

  data.nodes.forEach(n => { n.colour = CFG.palette[n.cluster_id] || '#999'; });

  const copIds = [...new Set(data.nodes.map(n => n.cluster_id))];
  document.getElementById('stats').textContent =
    `${data.nodes.length} tags · ${copIds.length} communities of practice`;

  // ── Scales ──
  const rScale = d3.scaleSqrt()
    .domain(d3.extent(data.nodes, d => d.count))
    .range([2.5, 28]);

  // ── Simulation — stronger repulsion to spread clusters apart ──
  const simulation = d3.forceSimulation(data.nodes)
    .force('link', d3.forceLink(data.links).id(d => d.id).distance(25).strength(0.08))
    .force('charge', d3.forceManyBody().strength(-80).distanceMax(350))
    .force('center', d3.forceCenter(width / 2, height / 2))
    .force('collision', d3.forceCollide().radius(d => rScale(d.count) + 3).strength(0.8))
    .force('x', d3.forceX(width / 2).strength(0.015))
    .force('y', d3.forceY(height / 2).strength(0.015));

  // ── Zoom ──
  const g = svg.append('g');
  const zoom = d3.zoom().scaleExtent([0.15, 5]).on('zoom', e => g.attr('transform', e.transform));
  svg.call(zoom);

  // ── Edges ──
  const link = g.append('g')
    .selectAll('line')
    .data(data.links)
    .enter().append('line')
    .attr('stroke', '#ccc')
    .attr('stroke-opacity', CFG.edgeAlpha)
    .attr('stroke-width', 0.4);

  // ── Nodes ──
  const node = g.append('g')
    .selectAll('g')
    .data(data.nodes)
    .enter().append('g')
    .style('cursor', 'pointer')
    .call(d3.drag()
      .on('start', (e, d) => { if (!e.active) simulation.alphaTarget(0.3).restart(); d.fx = d.x; d.fy = d.y; })
      .on('drag', (e, d) => { d.fx = e.x; d.fy = e.y; })
      .on('end', (e, d) => { if (!e.active) simulation.alphaTarget(0); d.fx = null; d.fy = null; }));

  node.append('circle')
    .attr('class', 'dot')
    .attr('r', d => rScale(d.count))
    .attr('fill', d => d.colour)
    .attr('fill-opacity', CFG.nodeAlpha)
    .attr('stroke', '#fff')
    .attr('stroke-width', 1)
    .attr('stroke-opacity', 0.9);

  // ── Tag labels — only top tags visible by default ──
  const labels = node.append('text')
    .attr('class', 'tag-label')
    .text(d => d.label)
    .attr('dx', d => rScale(d.count) + 4)
    .attr('dy', '0.35em')
    .attr('font-size', 10)
    .attr('font-weight', 400)
    .attr('fill', 'rgba(0, 0, 0, 0.45)')
    .style('pointer-events', 'none')
    .style('display', d => d.count >= CFG.labelMinCount ? 'block' : 'none');

  // ── COP centroid labels ──
  const copLabelGroup = g.append('g').attr('class', 'cop-labels');

  function updateCopLabels() {
    copLabelGroup.selectAll('*').remove();

    copIds.forEach(cid => {
      const members = data.nodes.filter(n => n.cluster_id === cid);
      if (!members.length) return;

      const cx = d3.mean(members, n => n.x);
      const cy = d3.mean(members, n => n.y);

      // Place label above the cluster centroid
      const topY = d3.min(members.filter(n => Math.abs(n.x - cx) < 120), n => n.y) || cy;

      const copNum = cid.replace('cop0', 'COP ').replace('cop', 'COP ');
      const shortLabel = members[0].cluster_short || '';

      copLabelGroup.append('text')
        .attr('x', cx)
        .attr('y', topY - 20)
        .attr('text-anchor', 'middle')
        .attr('font-size', 9)
        .attr('font-weight', 500)
        .attr('letter-spacing', '0.5px')
        .attr('fill', CFG.palette[cid])
        .attr('fill-opacity', 0.50)
        .text(copNum)
        .style('pointer-events', 'none');

      copLabelGroup.append('text')
        .attr('x', cx)
        .attr('y', topY - 8)
        .attr('text-anchor', 'middle')
        .attr('font-size', 8)
        .attr('font-weight', 300)
        .attr('fill', CFG.palette[cid])
        .attr('fill-opacity', 0.35)
        .text(shortLabel)
        .style('pointer-events', 'none');
    });
  }

  // ── Interactions ──

  function getConnected(nodeId) {
    const s = new Set([nodeId]);
    data.links.forEach(l => {
      const sid = typeof l.source === 'object' ? l.source.id : l.source;
      const tid = typeof l.target === 'object' ? l.target.id : l.target;
      if (sid === nodeId) s.add(tid);
      if (tid === nodeId) s.add(sid);
    });
    return s;
  }

  // Hover — show label for hovered node + its immediate cluster neighbours
  node.on('mouseover', (event, d) => {
    if (activeCop) return;

    // Show labels for same-cluster nodes only
    const sameCluster = new Set(data.nodes.filter(n => n.cluster_id === d.cluster_id).map(n => n.id));

    node.select('.dot')
      .transition().duration(150)
      .attr('fill-opacity', n => sameCluster.has(n.id) ? CFG.nodeAlpha : CFG.nodeDimmed)
      .attr('stroke-opacity', n => sameCluster.has(n.id) ? 0.9 : 0.15);

    // Show labels for cluster, but only top ones + hovered
    labels.transition().duration(150)
      .style('display', n => {
        if (n.id === d.id) return 'block';
        if (sameCluster.has(n.id) && n.count >= 5) return 'block';
        return 'none';
      })
      .attr('fill', n => n.id === d.id ? 'rgba(0,0,0,0.8)' : 'rgba(0,0,0,0.4)');

    link.transition().duration(150)
      .attr('stroke-opacity', l => {
        const s = typeof l.source === 'object' ? l.source.id : l.source;
        const t = typeof l.target === 'object' ? l.target.id : l.target;
        return (sameCluster.has(s) && sameCluster.has(t)) ? CFG.edgeHighlight : CFG.edgeDimmed;
      })
      .attr('stroke', l => {
        const s = typeof l.source === 'object' ? l.source.id : l.source;
        const t = typeof l.target === 'object' ? l.target.id : l.target;
        return (sameCluster.has(s) && sameCluster.has(t)) ? d.colour : '#ccc';
      })
      .attr('stroke-width', l => {
        const s = typeof l.source === 'object' ? l.source.id : l.source;
        const t = typeof l.target === 'object' ? l.target.id : l.target;
        return (sameCluster.has(s) && sameCluster.has(t)) ? 1 : 0.3;
      });

    copLabelGroup.selectAll('text')
      .transition().duration(150)
      .attr('fill-opacity', function() {
        const txt = d3.select(this).text();
        const copNum = d.cluster_id.replace('cop0', 'COP ').replace('cop', 'COP ');
        return txt === copNum || txt === d.cluster_short ? 0.8 : 0.12;
      });

    showTip(event, d);
  })
  .on('mousemove', event => {
    tooltip.style.left = (event.pageX + 14) + 'px';
    tooltip.style.top = (event.pageY - 8) + 'px';
  })
  .on('mouseout', () => {
    if (activeCop) return;
    resetHighlight();
    hideTip();
  });

  // Click node → lock COP
  node.on('click', (event, d) => {
    event.stopPropagation();
    if (activeCop === d.cluster_id) { activeCop = null; resetHighlight(); }
    else { activeCop = d.cluster_id; highlightCop(d.cluster_id); }
  });

  // Click background → clear
  svg.on('click', () => {
    activeCop = null;
    document.getElementById('search').value = '';
    resetHighlight();
  });

  // Search
  document.getElementById('search').addEventListener('input', e => {
    const q = e.target.value.toLowerCase().trim();
    activeCop = null;
    if (!q) { resetHighlight(); return; }
    const matches = new Set(data.nodes.filter(n => n.label.toLowerCase().includes(q)).map(n => n.id));

    node.select('.dot')
      .transition().duration(200)
      .attr('fill-opacity', n => matches.has(n.id) ? CFG.nodeAlpha : CFG.nodeDimmed)
      .attr('stroke-opacity', n => matches.has(n.id) ? 0.9 : 0.1);

    labels.transition().duration(200)
      .style('display', n => matches.has(n.id) ? 'block' : 'none')
      .attr('fill', 'rgba(0,0,0,0.6)');

    link.transition().duration(200).attr('stroke-opacity', CFG.edgeDimmed);

    copLabelGroup.selectAll('text').transition().duration(200).attr('fill-opacity', 0.1);
  });

  // Reset button
  document.getElementById('btn-reset').addEventListener('click', () => {
    activeCop = null;
    document.getElementById('search').value = '';
    resetHighlight();
    svg.transition().duration(500).call(zoom.transform, d3.zoomIdentity);
  });

  // ── Highlight COP (click-lock) ──
  function highlightCop(cid) {
    const ids = new Set(data.nodes.filter(n => n.cluster_id === cid).map(n => n.id));
    const colour = CFG.palette[cid];

    node.select('.dot')
      .transition().duration(200)
      .attr('fill-opacity', n => ids.has(n.id) ? CFG.nodeAlpha : CFG.nodeDimmed)
      .attr('stroke-opacity', n => ids.has(n.id) ? 0.9 : 0.1);

    labels.transition().duration(200)
      .style('display', n => ids.has(n.id) && n.count >= 3 ? 'block' : 'none')
      .attr('fill', n => ids.has(n.id) ? 'rgba(0,0,0,0.55)' : 'rgba(0,0,0,0.3)');

    link.transition().duration(200)
      .attr('stroke-opacity', l => {
        const s = typeof l.source === 'object' ? l.source.id : l.source;
        const t = typeof l.target === 'object' ? l.target.id : l.target;
        return (ids.has(s) && ids.has(t)) ? CFG.edgeHighlight : CFG.edgeDimmed;
      })
      .attr('stroke', l => {
        const s = typeof l.source === 'object' ? l.source.id : l.source;
        const t = typeof l.target === 'object' ? l.target.id : l.target;
        return (ids.has(s) && ids.has(t)) ? colour : '#ccc';
      })
      .attr('stroke-width', l => {
        const s = typeof l.source === 'object' ? l.source.id : l.source;
        const t = typeof l.target === 'object' ? l.target.id : l.target;
        return (ids.has(s) && ids.has(t)) ? 1 : 0.3;
      });

    const copNum = cid.replace('cop0', 'COP ').replace('cop', 'COP ');
    copLabelGroup.selectAll('text')
      .transition().duration(200)
      .attr('fill-opacity', function() {
        const txt = d3.select(this).text();
        return (txt === copNum || txt === data.nodes.find(n => n.cluster_id === cid)?.cluster_short) ? 0.9 : 0.1;
      });
  }

  // ── Reset ──
  function resetHighlight() {
    node.select('.dot')
      .transition().duration(300)
      .attr('fill-opacity', CFG.nodeAlpha)
      .attr('stroke-opacity', 0.9);

    labels.transition().duration(300)
      .style('display', d => d.count >= CFG.labelMinCount ? 'block' : 'none')
      .attr('fill', 'rgba(0,0,0,0.45)');

    link.transition().duration(300)
      .attr('stroke-opacity', CFG.edgeAlpha)
      .attr('stroke', '#ccc')
      .attr('stroke-width', 0.4);

    copLabelGroup.selectAll('text')
      .transition().duration(300)
      .attr('fill-opacity', function() {
        return d3.select(this).attr('font-size') === '9' ? 0.50 : 0.35;
      });
  }

  function showTip(event, d) {
    tooltip.style.display = 'block';
    tooltip.querySelector('.tt-label').textContent = d.label;
    tooltip.querySelector('.tt-label').style.color = d.colour;
    tooltip.querySelector('.tt-cop').textContent = d.cluster_label;
    tooltip.querySelector('.tt-count').textContent = `${d.count} posts`;
    tooltip.style.left = (event.pageX + 14) + 'px';
    tooltip.style.top = (event.pageY - 8) + 'px';
  }

  function hideTip() { tooltip.style.display = 'none'; }

  // ── Tick ──
  let tickCount = 0;
  simulation.on('tick', () => {
    link
      .attr('x1', d => d.source.x).attr('y1', d => d.source.y)
      .attr('x2', d => d.target.x).attr('y2', d => d.target.y);
    node.attr('transform', d => `translate(${d.x},${d.y})`);
    tickCount++;
    if (tickCount % 50 === 0) updateCopLabels();
  });

  simulation.on('end', () => {
    updateCopLabels();
    link.attr('stroke', l => {
      const src = typeof l.source === 'object' ? l.source : data.nodes.find(n => n.id === l.source);
      return src ? src.colour : '#ccc';
    }).attr('stroke-opacity', CFG.edgeAlpha);
  });
});
</script>
</body>
</html>
